services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleet_password}
      POSTGRES_DB: ${POSTGRES_DB:-fleet_management}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-fleet}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fleet}:${POSTGRES_PASSWORD:-fleet_password}@db:5432/${POSTGRES_DB:-fleet_management}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      EMAIL_DRY_RUN: ${EMAIL_DRY_RUN:-true}
      FEATURE_INVENTORY: ${FEATURE_INVENTORY:-false}
      FEATURE_WHATSAPP: ${FEATURE_WHATSAPP:-false}
      SEED_ON_START: ${SEED_ON_START:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@fleet.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
      TZ: Asia/Dubai
    ports:
      - '4000:4000'
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  db_data:
  uploads:
